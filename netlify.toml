[build]
  publish = "."

# Proper headers for PWA + caching
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

# Redirect root to StudyHub.html
[[redirects]]
  from = "/"
  to = "/StudyHub.html"
  status = 200
